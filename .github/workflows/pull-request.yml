name: Build and test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: 
      - main
      - 'release/**'

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0 # Nerdbank.GitVersioning requires non-shallow checkout
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Restore
      run: dotnet restore -bl:LocatorRestore.binlog
    - name: Build
      run: dotnet build --no-restore -bl:MSBuildLocator.binlog
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Pack
      run: dotnet pack --no-build --configuration Debug -bl:LocatorPack.binlog
    - name: Upload Packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: package
        path: '**/*.*nupkg'
        if-no-files-found: error
    - name: Upload logs
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{ always() }}
      with:
        name: logs
        path: '**/*.binlog'
        if-no-files-found: error
